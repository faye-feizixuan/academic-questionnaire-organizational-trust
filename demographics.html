    <script>
        // 全局变量
        const totalPages = 9; // 总页面数
        let currentPage = 8; // 当前页面索引
        let participantId = ''; // 参与者ID
        let group = 0; // 分组 (1, 2, 或 3)
        
        // 初始化应用
        document.addEventListener('DOMContentLoaded', function() {
            // 加载问卷数据
            loadQuestionnaireData();
            
            // 绑定按钮事件
            document.getElementById('back-btn').addEventListener('click', goBack);
            document.getElementById('next-btn').addEventListener('click', goNext);
            
            // 绑定政治面貌选项变更事件
            const politicalRadioButtons = document.querySelectorAll('input[name="demo-q3"]');
            politicalRadioButtons.forEach(radio => {
                radio.addEventListener('change', function() {
                    // 如果选择了中共党员，显示入党年份输入框
                    if (this.value === '中共党员') {
                        document.getElementById('party-year-container').classList.remove('hidden');
                    } else {
                        document.getElementById('party-year-container').classList.add('hidden');
                    }
                });
            });
        });
        
        // 加载问卷数据
        function loadQuestionnaireData() {
            const savedData = localStorage.getItem('questionnaire_data');
            if (savedData) {
                const data = JSON.parse(savedData);
                participantId = data.participantId;
                group = data.group;
                currentPage = data.currentPage || 8;
                
                // 如果有已保存的答案，恢复选择
                if (data.demographics) {
                    const demographics = data.demographics;
                    
                    // 恢复性别选择
                    if (demographics['demo-q1']) {
                        const radioButton = document.querySelector(`input[name="demo-q1"][value="${demographics['demo-q1']}"]`);
                        if (radioButton) {
                            radioButton.checked = true;
                        }
                    }
                    
                    // 恢复出生年份
                    if (demographics['demo-q2']) {
                        document.getElementById('demo-q2').value = demographics['demo-q2'];
                    }
                    
                    // 恢复政治面貌
                    if (demographics['demo-q3']) {
                        const radioButton = document.querySelector(`input[name="demo-q3"][value="${demographics['demo-q3']}"]`);
                        if (radioButton) {
                            radioButton.checked = true;
                            
                            // 如果是中共党员，显示入党年份输入框
                            if (demographics['demo-q3'] === '中共党员') {
                                document.getElementById('party-year-container').classList.remove('hidden');
                                
                                // 恢复入党年份
                                if (demographics['demo-q3-party-year']) {
                                    document.getElementById('demo-q3-party-year').value = demographics['demo-q3-party-year'];
                                }
                            }
                        }
                    }
                    
                    // 恢复参加公职年份
                    if (demographics['demo-q4']) {
                        document.getElementById('demo-q4').value = demographics['demo-q4'];
                    }
                    
                    // 恢复工作职级
                    if (demographics['demo-q5']) {
                        const radioButton = document.querySelector(`input[name="demo-q5"][value="${demographics['demo-q5']}"]`);
                        if (radioButton) {
                            radioButton.checked = true;
                        }
                    }
                    
                    // 恢复职务类型
                    if (demographics['demo-q6']) {
                        const radioButton = document.querySelector(`input[name="demo-q6"][value="${demographics['demo-q6']}"]`);
                        if (radioButton) {
                            radioButton.checked = true;
                        }
                    }
                    
                    // 恢复工作所在地
                    if (demographics['demo-q24']) {
                        const radioButton = document.querySelector(`input[name="demo-q24"][value="${demographics['demo-q24']}"]`);
                        if (radioButton) {
                            radioButton.checked = true;
                        }
                        // 恢复其他说明
                        if (demographics['demo-q24-other']) {
                            document.getElementById('demo-q24-other-text').value = demographics['demo-q24-other'];
                        }
                    }
                    
                    // 恢复单位类型
                    if (demographics['demo-q25']) {
                        const radioButton = document.querySelector(`input[name="demo-q25"][value="${demographics['demo-q25']}"]`);
                        if (radioButton) {
                            radioButton.checked = true;
                        }
                        // 恢复其他说明
                        if (demographics['demo-q25-other']) {
                            document.getElementById('demo-q25-other-text').value = demographics['demo-q25-other'];
                        }
                    }
                }
                
                updateProgress();
            } else {
                // 如果没有保存的数据，返回欢迎页
                window.location.href = 'index.html';
            }
        }
        
        // 更新进度条
        function updateProgress() {
            const progress = Math.round((currentPage / totalPages) * 100);
            document.getElementById('progress-bar').style.width = `${progress}%`;
            document.getElementById('progress-text').textContent = `${progress}%`;
        }
        
        // 返回上一页
        function goBack() {
            window.location.href = 'main-questionnaire.html';
        }
        
        // 前进到下一页
        async function goNext() {
            // 验证所有必填项
            const answers = {};
            let isValid = true;
            let errorMessage = '';
            
            // 验证性别
            const gender = document.querySelector('input[name="demo-q1"]:checked');
            if (!gender) {
                isValid = false;
                errorMessage = '请选择您的性别。';
            } else {
                answers['demo-q1'] = gender.value;
            }
            
            // 验证出生年份
            const birthYear = document.getElementById('demo-q2').value;
            if (!birthYear) {
                isValid = false;
                errorMessage = '请输入您的出生年份。';
            } else {
                const year = parseInt(birthYear);
                if (year < 1900 || year > 2026) {
                    isValid = false;
                    errorMessage = '请输入有效的出生年份（1900-2026）。';
                } else {
                    answers['demo-q2'] = birthYear;
                }
            }
            
            // 验证政治面貌
            const political = document.querySelector('input[name="demo-q3"]:checked');
            if (!political) {
                isValid = false;
                errorMessage = '请选择您的政治面貌。';
            } else {
                answers['demo-q3'] = political.value;
                
                // 如果是中共党员，验证入党年份
                if (political.value === '中共党员') {
                    const partyYear = document.getElementById('demo-q3-party-year').value;
                    if (!partyYear) {
                        isValid = false;
                        errorMessage = '请输入您的入党年份。';
                    } else {
                        const year = parseInt(partyYear);
                        if (year < 1900 || year > 2026) {
                            isValid = false;
                            errorMessage = '请输入有效的入党年份（1900-2026）。';
                        } else {
                            answers['demo-q3-party-year'] = partyYear;
                        }
                    }
                }
            }
            
            // 验证参加公职年份
            const publicServiceYear = document.getElementById('demo-q4').value;
            if (!publicServiceYear) {
                isValid = false;
                errorMessage = '请输入您参加公职的年份。';
            } else {
                const year = parseInt(publicServiceYear);
                if (year < 1900 || year > 2026) {
                    isValid = false;
                    errorMessage = '请输入有效的参加公职年份（1900-2026）。';
                } else {
                    answers['demo-q4'] = publicServiceYear;
                }
            }
            
            // 验证工作职级
            const rank = document.querySelector('input[name="demo-q5"]:checked');
            if (!rank) {
                isValid = false;
                errorMessage = '请选择您的工作职级。';
            } else {
                answers['demo-q5'] = rank.value;
            }
            
            // 验证职务类型
            const position = document.querySelector('input[name="demo-q6"]:checked');
            if (!position) {
                isValid = false;
                errorMessage = '请选择您的职务类型。';
            } else {
                answers['demo-q6'] = position.value;
            }
            
            // 验证工作所在地
            const location = document.querySelector('input[name="demo-q24"]:checked');
            if (!location) {
                isValid = false;
                errorMessage = '请选择您的工作所在地。';
            } else {
                answers['demo-q24'] = location.value;
                // 如果选择了其他，保存说明文字
                if (location.value === '其他') {
                    const otherText = document.getElementById('demo-q24-other-text').value;
                    answers['demo-q24-other'] = otherText;
                }
            }
            
            // 验证单位类型
            const unitType = document.querySelector('input[name="demo-q25"]:checked');
            if (!unitType) {
                isValid = false;
                errorMessage = '请选择您的单位类型。';
            } else {
                answers['demo-q25'] = unitType.value;
                // 如果选择了其他，保存说明文字
                if (unitType.value === '其他') {
                    const otherText = document.getElementById('demo-q25-other-text').value;
                    answers['demo-q25-other'] = otherText;
                }
            }
            
            // 如果验证失败，显示错误消息
            if (!isValid) {
                document.getElementById('error-text').textContent = errorMessage;
                document.getElementById('error-message').classList.remove('hidden');
                return;
            }
            
            // 保存答案
            saveAnswers(answers);
            
            // 更新当前页面
            currentPage = 9;
            
            // 保存问卷数据
            await saveQuestionnaireData();
            
            // 导航到联系方式与问卷提交页
            window.location.href = 'interview.html';
        }
        
        // 保存答案
        function saveAnswers(answers) {
            const savedData = localStorage.getItem('questionnaire_data');
            if (savedData) {
                const data = JSON.parse(savedData);
                data.demographics = answers;
                localStorage.setItem('questionnaire_data', JSON.stringify(data));
            }
        }
        
        // 保存问卷数据
        async function saveQuestionnaireData() {
            const savedData = localStorage.getItem('questionnaire_data');
            if (savedData) {
                const data = JSON.parse(savedData);
                data.currentPage = currentPage;
                localStorage.setItem('questionnaire_data', JSON.stringify(data));
                
                // 保存到服务器
                try {
                    await autoSaveData(data);
                    console.log('数据已成功保存到服务器');
                } catch (error) {
                    console.warn('保存到服务器失败，数据已保存到本地:', error.message);
                }
            }
        }
    </script>
</body>
</html>
